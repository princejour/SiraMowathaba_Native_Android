name: Unzip and Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository files
        run: ls -la

      - name: Find ZIP file
        id: find_zip
        run: |
          ZIP_FILE="$(find . -maxdepth 1 -type f -iname '*.zip' | head -n 1)"
          if [ -z "$ZIP_FILE" ]; then
            echo "No ZIP file found in repository root."
            exit 1
          fi
          echo "zip_file=$ZIP_FILE" >> "$GITHUB_OUTPUT"
          echo "Found ZIP: $ZIP_FILE"

      - name: Unzip project
        run: |
          mkdir extracted
          unzip -q "${{ steps.find_zip.outputs.zip_file }}" -d extracted
          echo "Extracted files:"
          find extracted -maxdepth 3 -type f | head -n 50

      - name: Find Android project folder
        id: find_project
        run: |
          PROJECT_DIR="$(find extracted -name 'settings.gradle' -o -name 'settings.gradle.kts' | head -n 1 | xargs dirname)"
          if [ -z "$PROJECT_DIR" ]; then
            echo "No Android project found. settings.gradle not found."
            exit 1
          fi
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "Android project folder: $PROJECT_DIR"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Build APK
        run: |
          cd "${{ steps.find_project.outputs.project_dir }}"
          gradle assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sira-mowathaba-native-apk
          path: ${{ steps.find_project.outputs.project_dir }}/app/build/outputs/apk/debug/*.apk
