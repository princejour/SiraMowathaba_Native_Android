name: Build Model 1 Independent APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find ZIP file
        id: find_zip
        run: |
          set -e
          ZIP_FILE="$(find . -maxdepth 1 -type f -iname '*.zip' | head -n 1)"
          if [ -z "$ZIP_FILE" ]; then
            echo "No ZIP file found in repository root."
            exit 1
          fi
          echo "zip_file=$ZIP_FILE" >> "$GITHUB_OUTPUT"
          echo "Found ZIP: $ZIP_FILE"

      - name: Unzip project
        run: |
          set -e
          rm -rf extracted
          mkdir extracted
          unzip -q "${{ steps.find_zip.outputs.zip_file }}" -d extracted
          echo "Extracted files:"
          find extracted -maxdepth 4 -type f | head -n 80

      - name: Find Android project folder
        id: find_project
        run: |
          set -e
          PROJECT_FILE="$(find extracted -name 'settings.gradle' -o -name 'settings.gradle.kts' | head -n 1)"
          if [ -z "$PROJECT_FILE" ]; then
            echo "No Android project found. settings.gradle not found."
            exit 1
          fi
          PROJECT_DIR="$(dirname "$PROJECT_FILE")"
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "Android project folder: $PROJECT_DIR"

      - name: Force independent package name
        run: |
          set -e
          cd "${{ steps.find_project.outputs.project_dir }}"
          python3 - <<'PY'
          from pathlib import Path
          import re
          new_app_id = "com.walhero.sira.model1.independent"
          new_label = "نموذج 1 مستقل"
          gradle_files = list(Path('.').rglob('build.gradle')) + list(Path('.').rglob('build.gradle.kts'))
          if not gradle_files:
              raise SystemExit('No Gradle files found')
          changed_app_gradle = False
          for gf in gradle_files:
              text = gf.read_text(encoding='utf-8')
              original = text
              text = re.sub(r'applicationId\s+"[^"]+"', f'applicationId "{new_app_id}"', text)
              text = re.sub(r'applicationId\s*=\s*"[^"]+"', f'applicationId = "{new_app_id}"', text)
              text = re.sub(r"applicationId\s+'[^']+'", f"applicationId '{new_app_id}'", text)
              text = re.sub(r'namespace\s+"[^"]+"', f'namespace "{new_app_id}"', text)
              text = re.sub(r'namespace\s*=\s*"[^"]+"', f'namespace = "{new_app_id}"', text)
              text = re.sub(r"namespace\s+'[^']+'", f"namespace '{new_app_id}'", text)
              text = re.sub(r'applicationIdSuffix\s+"[^"]*"', 'applicationIdSuffix ""', text)
              text = re.sub(r'applicationIdSuffix\s*=\s*"[^"]*"', 'applicationIdSuffix = ""', text)
              text = re.sub(r"applicationIdSuffix\s+'[^']*'", "applicationIdSuffix ''", text)
              if gf.name in ('build.gradle', 'build.gradle.kts') and gf.parent.name == 'app':
                  if 'applicationId' not in text and 'defaultConfig {' in text:
                      text = text.replace('defaultConfig {', 'defaultConfig {\n        applicationId "' + new_app_id + '"', 1)
                  if 'namespace' not in text and 'android {' in text:
                      text = text.replace('android {', 'android {\n    namespace "' + new_app_id + '"', 1)
                  changed_app_gradle = True
              if text != original:
                  gf.write_text(text, encoding='utf-8')
                  print('Updated', gf)
          for mf in Path('.').rglob('AndroidManifest.xml'):
              s = mf.read_text(encoding='utf-8')
              original = s
              s = re.sub(r'package="[^"]+"', f'package="{new_app_id}"', s)
              s = re.sub(r'android:label="[^"]+"', f'android:label="{new_label}"', s, count=1)
              if s != original:
                  mf.write_text(s, encoding='utf-8')
                  print('Updated', mf)
          for sp in Path('.').rglob('strings.xml'):
              s = sp.read_text(encoding='utf-8')
              original = s
              if '<string name="app_name"' in s:
                  s = re.sub(r'<string name="app_name">.*?</string>', f'<string name="app_name">{new_label}</string>', s)
              if s != original:
                  sp.write_text(s, encoding='utf-8')
                  print('Updated', sp)
          if not changed_app_gradle:
              raise SystemExit('app/build.gradle or app/build.gradle.kts not found')
          print('Independent app id forced:', new_app_id)
          print('Independent app label:', new_label)
          PY

      - name: Make Model 1 start with empty imported classes only
        run: |
          set -e
          cd "${{ steps.find_project.outputs.project_dir }}"
          python3 - <<'PY'
          from pathlib import Path
          patch = r'''
/* MODEL1_INDEPENDENT_EMPTY_CLASSES_PATCH */
(function(){
  window.replaceDataWithPersonalClasses = function(){
    const personal = (typeof getPersonalClasses === 'function') ? getPersonalClasses() : {};
    Object.keys(data || {}).forEach(k => delete data[k]);
    Object.keys(personal || {}).forEach(k => {
      if(!Array.isArray(personal[k]) || personal[k].length === 0) return;
      const classKey = (typeof normalizeClassNameForStorage === 'function') ? normalizeClassNameForStorage(k) : k;
      if(!data[classKey]) data[classKey] = [];
      personal[k].forEach(studentName => {
        if(studentName && !data[classKey].includes(studentName)) data[classKey].push(studentName);
      });
    });
    if(typeof applyStudentRenamesToData === 'function') applyStudentRenamesToData();
  };
  window.saveImportedPersonalClasses = function(personal){
    const keys = Object.keys(personal || {});
    if(keys.length === 0){
      showToast('لم يتم العثور على أقسام وتلاميذ داخل الملف. تأكد من وجود عمود: القسم وعمود: اسم التلميذ','info');
      return;
    }
    const clean = {};
    keys.forEach(className => {
      if(!Array.isArray(personal[className])) return;
      const classKey = normalizeClassNameForStorage(className);
      if(!clean[classKey]) clean[classKey] = [];
      personal[className].forEach(studentName => {
        if(studentName && !clean[classKey].includes(studentName)) clean[classKey].push(studentName);
      });
    });
    savePersonalClasses(clean);
    replaceDataWithPersonalClasses();
    refreshClassSelectOptions(Object.keys(clean)[0] || '');
    resetDashboard();
    renderStudentsList();
    renderPersonalClassesList();
    clearImportedClassesFile();
    showToast('تم استبدال القوائم القديمة بالقوائم الجديدة فقط','success');
  };
  window.clearAllPersonalClasses = function(){
    if(!confirm('هل تريد مسح كل الأقسام المستوردة من هذا الهاتف؟')) return;
    savePersonalClasses({});
    replaceDataWithPersonalClasses();
    refreshClassSelectOptions();
    resetDashboard();
    renderStudentsList();
    renderPersonalClassesList();
    showToast('تم مسح كل الأقسام. يمكنك الآن استيراد أقسام جديدة','info');
  };
})();
'''
          patched = 0
          for html in list(Path('.').rglob('*.html')):
              s = html.read_text(encoding='utf-8')
              if 'MODEL1_INDEPENDENT_EMPTY_CLASSES_PATCH' in s:
                  continue
              if 'replaceDataWithPersonalClasses' in s and 'getPersonalClasses' in s:
                  s = s.replace('</script>', patch + '\n</script>')
                  html.write_text(s, encoding='utf-8')
                  patched += 1
                  print('Patched empty classes in', html)
          if patched == 0:
              raise SystemExit('No HTML app file was patched; import/default classes code not found')
          PY

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Build APK
        run: |
          set -e
          cd "${{ steps.find_project.outputs.project_dir }}"
          if [ -f ./gradlew ]; then
            chmod +x ./gradlew
            ./gradlew assembleDebug
          else
            gradle assembleDebug
          fi

      - name: Verify independent APK package
        run: |
          set -e
          cd "${{ steps.find_project.outputs.project_dir }}"
          APK_FILE="$(find app/build/outputs/apk -type f -name '*.apk' | head -n 1)"
          echo "APK: $APK_FILE"
          AAPT="$(find "$ANDROID_HOME/build-tools" -name aapt | sort -V | tail -n 1)"
          BADGING="$($AAPT dump badging "$APK_FILE")"
          echo "$BADGING" | head -n 5
          echo "$BADGING" | grep "package: name='com.walhero.sira.model1.independent'" || {
            echo "ERROR: APK is not independent. Package name was not changed."
            exit 1
          }

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: model1-independent-empty-import-apk
          path: ${{ steps.find_project.outputs.project_dir }}/app/build/outputs/apk/**/*.apk
